databases:
  - name: researchpilot-db
    databaseName: researchpilot
    plan: free

services:
  # The FastAPI Backend
  - type: web
    name: researchpilot-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: researchpilot-db
          property: connectionString
      # These keys must be manually entered in the Render Dashboard securely!
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
