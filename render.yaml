services:
  # The FastAPI Backend
  - type: web
    name: researchpilot-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      # These keys must be manually entered in the Render Dashboard securely!
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false

  # The React Frontend
  - type: web
    name: researchpilot-frontend
    env: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
    envVars:
      # Inject the dynamic backend URL into the Vite build process
      - key: VITE_API_URL
        fromService:
          type: web
          name: researchpilot-backend
          envVarKey: RENDER_EXTERNAL_URL
